        </div>
      </div>

          </div>
        </div>
      </div>

      <div class="card">

          <div class="card-front">✦</div>
          <div class="card-back">
            <h2 class="card-title"></h2>
          </div>
        </div>
      </div>

    </div>

      <button id="shareBtn" class="share-btn">
        Share to Story ✨
      </button>
    </div>

  </main>

</html>
